<?xml version="1.0" encoding="UTF-8"?>
<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background Circle -->
  <circle cx="256" cy="256" r="240" fill="url(#gradient1)" stroke="url(#stroke1)" stroke-width="8"/>
  
  <!-- Central Letter C -->
  <g transform="translate(160, 180)">
    <!-- Outer C -->
    <path d="M96 0C43.2 0 0 43.2 0 96v64c0 52.8 43.2 96 96 96h32v-48H96c-26.4 0-48-21.6-48-48V96c0-26.4 21.6-48 48-48h96v-48H96z" fill="url(#gradient2)"/>
    <!-- Inner C shadow -->
    <path d="M96 32C61.4 32 32 61.4 32 96v64c0 34.6 29.4 64 64 64h48v-32H96c-17.6 0-32-14.4-32-32V96c0-17.6 14.4-32 32-32h80v-32H96z" fill="#ffffff" opacity="0.3"/>
  </g>
  
  <!-- Arrow Growth -->
  <g transform="translate(340, 160)">
    <path d="M0 80L80 0L80 40L140 40L140 120L80 120L80 80Z" fill="url(#gradient3)"/>
    <circle cx="30" cy="50" r="12" fill="#ffffff" opacity="0.9"/>
  </g>
  
  <!-- Currency Symbols -->
  <g transform="translate(60, 140)" fill="url(#gradient4)" font-family="Arial, sans-serif" font-weight="bold" font-size="40">
    <text x="0" y="0">$</text>
    <text x="0" y="180">¥</text>
  </g>
  
  <g transform="translate(420, 160)" fill="url(#gradient4)" font-family="Arial, sans-serif" font-weight="bold" font-size="40">
    <text x="0" y="0">€</text>
    <text x="0" y="140">₹</text>
  </g>
  
  <!-- Bottom Chart/Calculator Icon -->
  <g transform="translate(170, 350)">
    <rect x="0" y="0" width="172" height="100" rx="12" fill="url(#gradient5)" opacity="0.9"/>
    <rect x="15" y="15" width="25" height="25" rx="4" fill="#ffffff" opacity="0.9"/>
    <rect x="50" y="15" width="25" height="25" rx="4" fill="#ffffff" opacity="0.7"/>
    <rect x="85" y="15" width="25" height="25" rx="4" fill="#ffffff" opacity="0.9"/>
    <rect x="120" y="15" width="25" height="25" rx="4" fill="#ffffff" opacity="0.6"/>
    <rect x="150" y="15" width="15" height="70" rx="4" fill="#ffffff" opacity="0.8"/>
    
    <!-- Chart bars -->
    <rect x="20" y="60" width="12" height="20" fill="url(#gradient3)"/>
    <rect x="38" y="55" width="12" height="25" fill="url(#gradient3)"/>
    <rect x="56" y="50" width="12" height="30" fill="url(#gradient3)"/>
    <rect x="74" y="45" width="12" height="35" fill="url(#gradient3)"/>
    <rect x="92" y="40" width="12" height="40" fill="url(#gradient3)"/>
  </g>
  
  <!-- Subtle glow effect -->
  <circle cx="256" cy="256" r="200" fill="none" stroke="url(#glow)" stroke-width="2" opacity="0.6"/>
  
  <!-- Gradients -->
  <defs>
    <!-- Main background gradient -->
    <radialGradient id="gradient1" cx="50%" cy="30%" r="80%">
      <stop offset="0%" style="stop-color:#1e3a8a;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#1e40af;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f172a;stop-opacity:1" />
    </radialGradient>
    
    <!-- Stroke gradient -->
    <linearGradient id="stroke1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06b6d4;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
    
    <!-- C letter gradient -->
    <linearGradient id="gradient2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8fafc;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#e2e8f0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#cbd5e1;stop-opacity:1" />
    </linearGradient>
    
    <!-- Arrow gradient -->
    <linearGradient id="gradient3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#059669;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#047857;stop-opacity:1" />
    </linearGradient>
    
    <!-- Currency symbols gradient -->
    <linearGradient id="gradient4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06b6d4;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#0891b2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0e7490;stop-opacity:1" />
    </linearGradient>
    
    <!-- Calculator gradient -->
    <linearGradient id="gradient5" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#2563eb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1d4ed8;stop-opacity:1" />
    </linearGradient>
    
    <!-- Glow effect -->
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06b6d4;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:0.8" />
    </linearGradient>
  </defs>
</svg>